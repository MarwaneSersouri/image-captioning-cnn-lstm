seed: 42

data:
  dataset_name: "Flickr8k"
  image_dir: "data/raw/images"
  captions_file: "data/raw/captions.txt"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  min_word_freq: 2
  max_caption_length: 30

image:
  size: 224

training:
  batch_size: 32
  num_epochs: 20
  learning_rate: 0.001
  weight_decay: 0.0

model:
  embed_dim: 256
  hidden_dim: 512
  vocab_threshold: 2
  dropout: 0.3

device: "cpu"